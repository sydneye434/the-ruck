<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" width="920">
  <title>The Ruck  Capacity planning (illustrative)</title>
  <rect width="920" height="560" fill="#050505"/>
  <text x="88" y="48" fill="#ffeaf6" font-family="system-ui,sans-serif" font-size="18" font-weight="600">Capacity planning</text>
  <rect x="88" y="72" width="744" height="420" fill="#101010" stroke="#2a2a2a" rx="6"/>
  <text x="104" y="104" fill="#ffc8e5" font-family="system-ui,sans-serif" font-size="13">Velocity window Ę Team availability</text>
  <rect x="104" y="124" width="400" height="160" fill="#1a1a1a" stroke="#2a2a2a" rx="4"/>
  <rect x="120" y="200" width="280" height="24" fill="#2a2a2a" rx="2"/>
  <rect x="120" y="232" width="200" height="24" fill="#ff1493" opacity="0.35" rx="2"/>
  <text x="104" y="320" fill="#ffc8e5" font-family="system-ui,sans-serif" font-size="13">Recommended capacity</text>
  <text x="104" y="360" fill="#ff1493" font-family="system-ui,sans-serif" font-size="28" font-weight="bold">34</text>
  <text x="160" y="360" fill="#c48aa9" font-family="system-ui,sans-serif" font-size="14">pts</text>
  <rect x="104" y="400" width="160" height="36" fill="#ff1493" rx="4"/>
  <text x="184" y="422" fill="#050505" font-family="system-ui,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Save target</text>
  <text x="460" y="548" fill="#c48aa9" font-family="system-ui,sans-serif" font-size="11" text-anchor="middle">Illustrative mock  replace with your own screenshot if you prefer</text>
